# Cloudflare Worker: reverse proxy to the Python studio API + optional KV cache for /api/studio/health.
# See apps/studio-edge/README.md for production DNS (avoid fetch loops).

name = "immersive-studio-edge"
main = "src/index.ts"
compatibility_date = "2025-01-01"
account_id = "10374f367672f4d19db430601db0926b"

# With custom zone `routes` below, Wrangler otherwise disables workers.dev + preview URLs
# (dashboard shows them as inactive). Keep these true for *.workers.dev smoke tests and PR previews.
workers_dev = true
preview_urls = true

# Route Worker on public API hostname (zone must be on Cloudflare).
routes = [
  { pattern = "api.immersivelabs.space/*", zone_name = "immersivelabs.space" },
]

# Public URL where the Python worker is reachable (no trailing slash, no path).
# Must NOT be the Worker hostname (e.g. not https://api.immersivelabs.space) or fetch() loops — use the
# tunnel origin host (api-origin…) that reaches FastAPI on the VM.
#
# Set here in [vars] OR via `wrangler secret put ORIGIN_URL` — Cloudflare forbids both at once (error 10053).
# If you switch from secret → vars, delete the secret first: `npx wrangler secret delete ORIGIN_URL`
[vars]
ORIGIN_URL = "https://api-origin.immersivelabs.space"
# Milliseconds to treat cached health JSON as fresh (KV write uses 60s TTL).
HEALTH_CACHE_TTL_MS = "5000"
# Must cover every browser origin that calls the Worker (Authorization triggers preflight).
# Keep in sync with GCE Docker STUDIO_CORS_ORIGINS (see studio-cors-origins.txt) and apps/studio-worker.
# Includes workers.dev for edge smoke tests; add exact *.pages.dev preview origins if previews call this API.
STUDIO_CORS_ORIGINS = "https://immersivelabs.vercel.app,https://www.immersivelabs.space,https://immersivelabs.space,https://immersive-studio-edge.nico-chikuji.workers.dev"

[[kv_namespaces]]
binding = "STUDIO_KV"
id = "155442cbef05433489d804d604f74594"

# Edge object store / SQL (optional in code; use for signed URLs, edge-only tables, etc.).
[[r2_buckets]]
binding = "STUDIO_R2"
bucket_name = "immersive-studio-edge-r2"

[[d1_databases]]
binding = "STUDIO_D1"
database_name = "immersive-studio-edge-meta"
database_id = "aca954e7-230c-4266-aaf7-e3781c5a4e58"
migrations_dir = "migrations"
