# Build and upload the immersive-studio wheel/sdist to PyPI.
#
# Auth (pick one):
# 1) Recommended for reliability: GitHub repo secret PYPI_API_TOKEN (PyPI API token with
#    upload scope for project immersive-studio). Uses Twine token auth — no OIDC setup.
# 2) OIDC trusted publishing: leave PYPI_API_TOKEN unset; configure PyPI pending publisher
#    with your GitHub owner/repo, workflow publish-immersive-studio.yml, and leave
#    Environment name EMPTY (matches GitHub claim environment: MISSING).

name: PyPI publish (immersive-studio package)

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  pypi:
    name: Build and publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build --outdir dist

      - name: Choose PyPI auth mode
        id: auth
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$PYPI_API_TOKEN" ]; then
            echo "mode=token" >> "$GITHUB_OUTPUT"
            echo "Using PYPI_API_TOKEN (Twine token upload)."
          else
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            echo "Using OIDC trusted publishing (PYPI_API_TOKEN not set)."
          fi

      - name: Publish to PyPI (API token)
        if: steps.auth.outputs.mode == 'token'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: apps/studio-worker/dist
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish to PyPI (trusted publishing / OIDC)
        if: steps.auth.outputs.mode == 'oidc'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: apps/studio-worker/dist
