# Build and upload the immersive-studio wheel/sdist to PyPI.
#
# Requires GitHub repository secret PYPI_API_TOKEN (PyPI API token with upload scope
# for project immersive-studio). Upload is plain `twine` on the runner — no OIDC and
# no pypa/gh-action-pypi-publish (avoids trusted-publishing / invalid-publisher entirely).
#
# Add the secret under: Settings → Secrets and variables → Actions → Repository secrets.
# Name must be exactly: PYPI_API_TOKEN

name: PyPI publish (immersive-studio package)

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    name: Build and publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build --outdir dist

      - name: Publish to PyPI (twine)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TWINE_PASSWORD:-}" ]; then
            echo "::error::Repository secret PYPI_API_TOKEN is missing or empty."
            echo "::error::Add it under Settings → Secrets and variables → Actions (Repository secrets), exact name PYPI_API_TOKEN."
            exit 1
          fi
          pip install twine
          python -m twine check dist/*
          python -m twine upload --non-interactive dist/*
