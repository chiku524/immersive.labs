# Build and upload the immersive-studio wheel/sdist to PyPI.
#
# Auth (pick one):
# 1) Recommended: GitHub repository secret PYPI_API_TOKEN (PyPI API token with upload
#    scope for project immersive-studio). Upload uses `twine` on the runner — no OIDC,
#    no Docker publish action (avoids spurious trusted-publishing calls).
# 2) OIDC: leave PYPI_API_TOKEN unset; configure PyPI trusted publisher (repo, workflow
#    publish-immersive-studio.yml, empty environment name).

name: PyPI publish (immersive-studio package)

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  pypi:
    name: Build and publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build --outdir dist

      - name: Choose PyPI auth mode
        id: auth
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$PYPI_API_TOKEN" ]; then
            echo "mode=token" >> "$GITHUB_OUTPUT"
            echo "Using PYPI_API_TOKEN (twine upload on runner)."
          else
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            echo "Using OIDC (PYPI_API_TOKEN empty — configure trusted publishing on PyPI)."
          fi

      - name: Show selected auth mode
        run: echo "Selected PyPI auth mode=${{ steps.auth.outputs.mode }}"

      - name: Publish to PyPI (API token via twine)
        if: steps.auth.outputs.mode == 'token'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          python -m twine check dist/*
          python -m twine upload --non-interactive dist/*

      - name: Publish to PyPI (trusted publishing / OIDC)
        if: steps.auth.outputs.mode == 'oidc'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: apps/studio-worker/dist
          attestations: "false"
