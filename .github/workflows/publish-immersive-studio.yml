# Build and upload the immersive-studio wheel/sdist to PyPI.
#
# Trusted publishing on PyPI:
# - Workflow name = this file's basename: publish-immersive-studio.yml
# - Repository must match exactly (e.g. chiku524/immersive.labs).
# - On PyPI, leave "Environment name" EMPTY unless you also use a GitHub Environment here.
# - Optional: repo secret PYPI_API_TOKEN uploads via token (bypasses OIDC if set).

name: PyPI publish (immersive-studio package)

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  pypi:
    name: Build and publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build --outdir dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: apps/studio-worker/dist
          # When unset, empty string → action uses OIDC (trusted publishing).
          password: ${{ secrets.PYPI_API_TOKEN }}
