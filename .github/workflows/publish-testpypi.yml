# Optional dry-run upload to TestPyPI (does not touch pypi.org).
# Add repository secret TESTPYPI_API_TOKEN from https://test.pypi.org/manage/account/token/

name: Publish to TestPyPI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build --outdir dist

      - name: Upload to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TWINE_PASSWORD:-}" ]; then
            echo "::error::Repository secret TESTPYPI_API_TOKEN is missing. Create a token at https://test.pypi.org/manage/account/token/"
            exit 1
          fi
          pip install twine
          python -m twine check dist/*
          python -m twine upload --non-interactive --repository-url https://test.pypi.org/legacy/ dist/*
