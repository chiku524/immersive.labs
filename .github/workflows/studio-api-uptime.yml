# Optional: ping public studio API health. Set repo secret STUDIO_PUBLIC_HEALTH_URL
# to the public API origin (no trailing slash), e.g. https://api.example.com — if unset,
# the job exits successfully without checking.

name: studio-api-uptime

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check /api/studio/health
        env:
          BASE: ${{ secrets.STUDIO_PUBLIC_HEALTH_URL }}
        run: |
          set -euo pipefail
          if [ -z "${BASE:-}" ]; then
            echo "STUDIO_PUBLIC_HEALTH_URL not set — add repo secret to enable uptime checks."
            exit 0
          fi
          # Secrets often include a trailing newline; strip whitespace so curl gets a valid URL.
          BASE="$(printf '%s' "$BASE" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' -e 's/\r$//')"
          if [ -z "$BASE" ]; then
            echo "STUDIO_PUBLIC_HEALTH_URL is empty after trimming."
            exit 1
          fi
          case "$BASE" in
            http://*|https://*) ;;
            *)
              echo "STUDIO_PUBLIC_HEALTH_URL must start with http:// or https:// (got: ${BASE:0:40}…)"
              exit 1
              ;;
          esac
          # Strip trailing slashes, then accept either API origin or full health URL in the secret
          # (otherwise https://host/api/studio/health + /api/studio/health → 404).
          while [[ "$BASE" == */ ]]; do BASE="${BASE%/}"; done
          if [[ "$BASE" == */api/studio/health ]]; then
            BASE="${BASE%/api/studio/health}"
            while [[ "$BASE" == */ ]]; do BASE="${BASE%/}"; done
          fi
          url="${BASE}/api/studio/health"
          echo "GET $url"
          code="$(
            curl -sS -o /tmp/health.json -w "%{http_code}" \
              --max-time 30 \
              --retry 5 --retry-delay 2 \
              "$url" || true
          )"
          if [ "$code" != "200" ]; then
            echo "Expected HTTP 200, got ${code:-curl failed}"
            if [ -s /tmp/health.json ]; then
              echo "Body (first 500 chars):"
              head -c 500 /tmp/health.json || true
              echo
            fi
            exit 1
          fi
          python3 - <<'PY'
          import json, sys
          with open("/tmp/health.json") as f:
              j = json.load(f)
          if j.get("status") != "ok":
              print("status is not ok:", j)
              sys.exit(1)
          print("ok:", j)
          PY
