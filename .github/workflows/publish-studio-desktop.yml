# Build Immersive Studio desktop installers, signed updater bundles, and latest.json.
#
# Triggers:
#   - push tag studio-desktop-v* (e.g. studio-desktop-v0.1.2)
#   - workflow_dispatch
#
# Required GitHub secrets for auto-updates:
#   TAURI_PRIVATE_KEY — minisign private key (contents of immersive-studio-updater.key)
#   TAURI_KEY_PASSWORD — optional if key has no password

name: Release Immersive Studio (desktop)

on:
  push:
    tags:
      - "studio-desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Immersive Studio ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Build ${{ matrix.platform }}
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

    steps:
      - uses: actions/checkout@v6

      - name: Set version from tag
        if: github.event_name == 'push'
        run: node scripts/studio-desktop/set-version-from-tag.cjs ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: apps/studio-desktop
          tagName: ${{ github.event.release.tag_name || github.ref_name || 'studio-desktop-v__VERSION__' }}
          releaseName: Immersive Studio v__VERSION__
          releaseBody: |
            Local-first Immersive Studio desktop app — Tripo AI meshes, Ollama specs, optional ComfyUI textures.

            **Auto-update:** this release includes signed updater bundles when `TAURI_PRIVATE_KEY` is configured.

            **After install (Windows):** run `setup-desktop-studio.ps1` from the release assets or use **Run setup** in the app Desktop panel.

            Download the installer for your OS below. Asset names use `Immersive.Studio_*`.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  update-manifest:
    needs: release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Generate latest.json for Tauri updater
        run: |
          node scripts/studio-desktop/generate-update-manifest.js "${{ github.ref_name }}" "${{ github.repository }}" --out=latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
