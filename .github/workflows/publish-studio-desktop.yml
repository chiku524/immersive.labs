# Build Immersive Studio desktop installers and attach them to GitHub Releases.
#
# Triggers:
#   - workflow_dispatch (manual)
#   - release published (tag like studio-desktop-v0.1.0)
#
# Outputs: Windows (.exe NSIS), macOS (.dmg), Linux (.deb / .AppImage) uploaded to the release.
# Code signing is not configured yet — users may see SmartScreen / Gatekeeper warnings.

name: Release Immersive Studio (desktop)

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/studio-desktop
          tagName: ${{ github.event.release.tag_name || 'studio-desktop-v__VERSION__' }}
          releaseName: Immersive Studio v__VERSION__
          releaseBody: |
            Local-first Immersive Studio desktop app (Ollama specs, Blender mesh, optional ComfyUI textures).

            **Requires on your PC:** Python venv worker setup (`scripts/local-pc-studio/setup-local-studio.ps1`), Ollama, Blender, optional ComfyUI.

            Download the installer for your OS below.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
