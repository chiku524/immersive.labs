# Local PC: studio-worker in Docker, ComfyUI + Ollama on the host (GPU-friendly).
#
#   docker compose -f scripts/local-pc-studio/docker-compose.local.yml up --build
#
# ComfyUI on the host must listen on 0.0.0.0:8188 (not only 127.0.0.1) so the container can reach it:
#   $env:COMFYUI_DOCKER_WORKER='1'; .\scripts\local-pc-studio\start-comfyui.ps1
#
# Tripo / Ollama / mesh settings come from apps/studio-worker/.env.local only (not overridden here).

services:
  studio-worker:
    build:
      context: ../..
      dockerfile: apps/studio-worker/Dockerfile
    ports:
      - "127.0.0.1:8787:8787"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      STUDIO_REPO_ROOT: /repo
      STUDIO_COMFY_URL: http://host.docker.internal:8188
      STUDIO_CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      STUDIO_EMBEDDED_QUEUE_WORKER: "1"
    env_file:
      - path: ../../apps/studio-worker/.env.local
        required: false
    volumes:
      - ../../apps/studio-worker/output:/repo/apps/studio-worker/output
