tunnel: 52513248-a776-4f3d-b6fb-7e17c3858b2b
credentials-file: /etc/cloudflared/52513248-a776-4f3d-b6fb-7e17c3858b2b.json

# api-origin → studio-worker (FastAPI). Public `api` may be served by Cloudflare Worker → ORIGIN_URL.
# comfy → ComfyUI on this same VM (default port 8188). If ComfyUI runs elsewhere, omit this ingress and
# point STUDIO_COMFY_URL on the worker to that host instead.
# Remotely managed tunnels: add the same hostnames in Zero Trust → Tunnels → Public hostnames.
ingress:
  - hostname: api-origin.immersivelabs.space
    service: http://127.0.0.1:8787
  - hostname: comfy.immersivelabs.space
    service: http://127.0.0.1:8188
  - service: http_status:404
